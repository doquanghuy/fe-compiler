# fe-compiler — `fe-pipeline` workflow.
#
# Spec Kit public workflow schema (`schema_version: "1.0"`).
#
# Command dispatch
# -----------------
# Every action step is a switch on `{{ inputs.quality_mode }}` routing
# to the correct mode-specific command:
#
#   fast   → speckit.axcore.step-run-fast
#   review → speckit.axcore.step-run-review
#   strict → speckit.axcore.step-run-strict
#
# The deprecated monolithic `speckit.axcore.step-run` command is not used.
#
# Identity:
#   plugin        = fe                          (see plugin.yaml)
#   workflow_id   = fe-pipeline                 (lowercase alphanumeric + hyphens)

schema_version: "1.0"

workflow:
  id: "fe-pipeline"
  name: "Frontend compiler pipeline"
  version: "0.1.1"
  author: "fe-compiler"
  workflow_status: production
  description: |
    Produce the frontend screen-outline artifact through the
    axcore kernel. Proves multi-compiler coexistence: the same
    SKILL + kernel + wire contract that powers `be-pipeline`
    drives this FE pipeline against fe-compiler's
    plugin-owned bundles.

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["claude"]

inputs:
  workspace:
    type: string
    required: false
    default: "."
    prompt: "Path to the workspace root."
  intent:
    type: string
    default: "auto"
    enum: ["auto", "improve", "rebuild"]
  # 3-channel input model — mirrors the canonical clean inputs from be-pipeline:
  #   seed_path             → file-first build brief / seed material.
  #   review_comments_path  → reviewer guidance for the current run.
  #   prior_run_id          → wires the prior-run findings memory.
  # The legacy `human_notes` input has been retired.
  seed_path:
    type: string
    default: ""
  review_comments_path:
    type: string
    default: ""
  prior_run_id:
    type: string
    default: ""
  quality_mode:
    type: string
    default: "fast"
    enum: ["fast", "review", "strict"]
  max_quality_iterations:
    type: string
    default: "2"
  max_structural_iterations:
    type: string
    default: "2"

steps:
  - id: screen_outline
    type: switch
    expression: "{{ inputs.quality_mode }}"
    cases:
      fast:
        - id: screen_outline-fast
          type: command
          integration: "claude"
          command: "speckit.axcore.step-run-fast"
          input:
            args: "plugin_id=fe step_id=screen_outline workflow_id=fe-pipeline intent={{ inputs.intent }} seed_path={{ inputs.seed_path }} review_comments_path={{ inputs.review_comments_path }} prior_run_id={{ inputs.prior_run_id }}"
      review:
        - id: screen_outline-review
          type: command
          integration: "claude"
          command: "speckit.axcore.step-run-review"
          input:
            args: "plugin_id=fe step_id=screen_outline workflow_id=fe-pipeline intent={{ inputs.intent }} seed_path={{ inputs.seed_path }} review_comments_path={{ inputs.review_comments_path }} prior_run_id={{ inputs.prior_run_id }} max_quality_iterations={{ inputs.max_quality_iterations }}"
      strict:
        - id: screen_outline-strict
          type: command
          integration: "claude"
          command: "speckit.axcore.step-run-strict"
          input:
            args: "plugin_id=fe step_id=screen_outline workflow_id=fe-pipeline intent={{ inputs.intent }} seed_path={{ inputs.seed_path }} review_comments_path={{ inputs.review_comments_path }} prior_run_id={{ inputs.prior_run_id }} max_quality_iterations={{ inputs.max_quality_iterations }} max_structural_iterations={{ inputs.max_structural_iterations }}"
