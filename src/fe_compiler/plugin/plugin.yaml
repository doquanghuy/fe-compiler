# fe-compiler — plugin manifest.
#
# Validates against axcore's schemas/plugin-manifest.schema.yaml.
# Source of truth for what fe-compiler contributes to the axcore
# platform. The Python entry point
# (`axcore.plugins = fe = fe_compiler.plugin.entry:FeCompilerPlugin`)
# points axcore at the plugin class; this manifest tells the
# framework what that plugin provides.
#
# Identity:
#   plugin_id     = fe
#   importable    = fe_compiler        (Python module name)
#   workflow      = fe-pipeline        (Spec Kit schema_version "1.0";
#                                       lowercase alphanumeric + hyphens)
#   container     = bundles/flows/     (artifact-type container)
#   steps         = screen_outline
#
# Status:
# - Discovery + manifest loading + bundle resolution are real.
# - One step today — `screen_outline`. It has no required upstream
#   (entry step of the pipeline); future frontend steps land here
#   and may declare cross-step consumption via `required_inputs`
#   (§6.14 in axcore/docs/spec-kit-extension.md).

plugin_id: fe
version: 0.1.0

# Framework compatibility requirement.
# The loader does not enforce this at runtime (P4 work);
# it is documented here as the canonical semantic constraint.
requires:
  axcore: ">=0.1.0,<0.2.0"

workflows:
  - id: fe-pipeline
    file: workflows/fe_pipeline.yaml

steps:
  - screen_outline

bundle_roots:
  - bundles/flows/

resource_roots: []

validator_hooks: []

capabilities:
  - frontend-domain

dependencies: []

metadata:
  author: fe-compiler maintainers
  summary: |
    Frontend-domain compiler package for axcore. Contributes a
    plugin manifest, one Spec Kit workflow definition, and one
    real step bundle. End-user runs happen through Spec Kit
    (`specify workflow run fe-pipeline`); this package is not
    a runtime shell.
  framework: axcore
  importable_package: fe_compiler
